<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>TVTRISTAN | Experience</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-dark: #000000;
            --text-color: #FFFFFF;
            --transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --card-bg: #232323;
            --neon-red: #ff0000;
            --neon-yellow: #ffcc00; 
            --neon-glow: 0 0 12px rgba(255, 0, 0, 0.8), 0 0 25px rgba(255, 0, 0, 0.4);
            --grey: #a3a3a3;
            --watched-green: #46d369;
            --sidebar-width: 60px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
            outline: none !important;
        }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--netflix-black);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
            zoom: 0.9; 
        }

        /* --- NUEVAS ANIMACIONES INTRO TRISTÁN TV --- */
        .intro-logo {
            font-size: 60px; font-weight: 900; color: transparent;
            -webkit-text-stroke: 2px var(--netflix-red);
            position: relative; margin: 0;
            animation: glowLogo 1.5s ease-in-out infinite alternate;
            letter-spacing: 5px;
            text-align: center;
        }
        .intro-logo::before {
            content: attr(data-text); position: absolute; left: 0; top: 0; width: 0; height: 100%;
            color: var(--netflix-red); overflow: hidden; white-space: nowrap;
            animation: fillText 2.5s ease forwards 0.5s;
        }
        .loading-bar-container {
            width: 300px; height: 4px; background: #222; border-radius: 2px; margin-top: 40px; overflow: hidden;
        }
        .loading-bar {
            width: 0%; height: 100%; background: var(--netflix-red);
            box-shadow: 0 0 10px var(--netflix-red); animation: loadBar 3.5s ease forwards 0.5s;
        }
        @keyframes fillText { 100% { width: 100%; } }
        @keyframes glowLogo { from { filter: drop-shadow(0 0 2px red); } to { filter: drop-shadow(0 0 15px red); } }
        @keyframes loadBar { 0% { width: 0%; } 40% { width: 60%; } 80% { width: 80%; } 100% { width: 100%; } }
        @keyframes pulseBtn { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes blinkText { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- ESTILOS ANUNCIO/SPLASH --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100000;
            display: none; /* Se activa por JS */
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
        #splash-screen img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none; /* Se turnan por JS */
        }

        /* --- ESTILOS SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: 0;
            top: 60px;
            bottom: 0;
            width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none; /* Se activa con JS tras login */
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 2000;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #808080;
            text-decoration: none;
            margin-bottom: 20px;
            border-radius: 50%;
            transition: var(--transition);
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .sidebar-item:focus {
            color: white;
            background: var(--netflix-red);
            box-shadow: var(--neon-glow);
            transform: scale(1.1);
        }

        /* Ajuste de margen para el contenido */
        .with-sidebar main {
            margin-left: var(--sidebar-width);
        }

        /* ACELERACIÓN POR HARDWARE */
        .movie-card, .row-container, .navbar, .episode-card, .nav-item {
            transform: translateZ(0); 
            will-change: transform, box-shadow;
            backface-visibility: hidden;
        }

        /* LOGIN STYLE */
        #login {
            position: fixed; inset: 0; z-index: 10000;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/f8ca341b-6837-40d2-9c8a-73975d567d74/7d23d917-062e-43a9-839c-b174786d38e8/MX-es-20230206-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: rgba(0,0,0,0.85); padding: 60px 68px 40px; border-radius: 8px;
            width: 100%; max-width: 400px;
        }
        .login-box h1 { margin-bottom: 28px; font-size: 28px; font-weight: bold; }
        
        .input-group { position: relative; width: 100%; margin-bottom: 16px; }
        
        .login-box input {
            width: 100%; padding: 14px;
            background: #333; border: none; border-radius: 4px;
            color: #fff; font-size: 14px; outline: none;
        }
        .login-box input:focus { box-shadow: var(--neon-glow); border: 1px solid var(--neon-red); }

        /* Estilos visualizador tiempo real */
        .live-preview-bar {
            background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--netflix-red);
            padding: 8px 12px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            border-radius: 2px;
            min-height: 35px;
        }

        .toggle-pass {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            z-index: 10;
        }

        .btn-red {
            width: 100%; padding: 14px; background: var(--netflix-red);
            color: #fff; border: none; border-radius: 4px;
            font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        .btn-red:focus { box-shadow: var(--neon-glow); }

        /* TOP NAVIGATION */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; align-items: center; padding: 0 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, transparent);
            z-index: 1000; transition: background 0.3s;
        }
        .navbar.scrolled { background: var(--netflix-black); }
        
        .brand-logo { 
            color: var(--netflix-red); 
            font-size: 24px; 
            font-weight: 900; 
            text-decoration: none; 
            margin-right: 40px;
            letter-spacing: -1px;
            cursor: pointer;
        }

        .nav-links { display: flex; gap: 18px; flex: 1; }
        .nav-link { 
            text-decoration: none; color: #e5e5e5; font-size: 13px; 
            transition: color 0.2s; background: none; border: none; cursor: pointer;
            padding: 5px 10px; border-radius: 4px;
        }
        .nav-link:focus, .nav-item:focus { 
            box-shadow: var(--neon-glow); 
            border-radius: 4px; 
            border: 1px solid var(--neon-red); 
            background: rgba(255,255,255,0.1);
        }
        
        /* HERO BANNER */
        .hero {
            height: 75vh; position: relative;
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding: 0 4%;
            margin-bottom: -60px;
            transition: background-image 0.8s ease-in-out;
        }
        .hero::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(77deg, rgba(0,0,0,.6) 0, rgba(0,0,0,0) 85%),
                        linear-gradient(to top, var(--netflix-black), transparent);
        }
        .hero-content { position: relative; z-index: 10; max-width: 500px; }
        
        /* BOTÓN SLIDER: ESTILO ANDROID ROJO */
        .btn-netflix-play-hero {
            background-color: var(--netflix-red) !important; 
            color: white !important;
            border: none !important; 
            padding: 12px 25px !important;
            border-radius: 4px !important; 
            font-weight: bold !important;
            font-size: 16px !important; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            gap: 8px;
            width: fit-content; 
            justify-content: center;
            margin-bottom: 10px;
            transition: var(--transition);
        }
        .btn-netflix-play-hero:focus { 
            box-shadow: var(--neon-glow); 
            transform: scale(1.08); 
        }

        /* BOTÓN MODAL/SYNOPSIS: ESTILO ANDROID BLANCO CHICO */
        .btn-netflix-play-mini {
            background-color: #fff !important; 
            color: #000 !important;
            border: none !important; 
            padding: 8px 16px !important; 
            border-radius: 4px !important; 
            font-weight: bold !important;
            font-size: 14px !important; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            gap: 6px;
            width: fit-content !important; 
            justify-content: center;
            transition: var(--transition);
        }
        .btn-netflix-play-mini:focus { 
            box-shadow: var(--neon-glow); 
            transform: scale(1.05);
            background-color: #e6e6e6 !important;
        }

        .btn-netflix-info {
            background-color: rgba(109, 109, 110, 0.7) !important; color: white !important;
            border: none !important; padding: 10px 25px !important;
            border-radius: 4px !important; font-weight: bold !important;
            font-size: 16px !important; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }

        /* AJUSTE ESTILO ANDROID BOTÓN VOLVER */
        .btn-netflix-back {
            background-color: #2f2f2f !important; color: #fff !important;
            border: none !important; 
            padding: 8px 16px !important; 
            border-radius: 4px !important; 
            font-weight: bold !important;
            font-size: 14px !important; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            gap: 8px;
            width: fit-content !important; 
            justify-content: flex-start;
        }
        .btn-netflix-back:focus { box-shadow: var(--neon-glow); border: 1px solid var(--neon-red); }

        /* MINI SYNOPSIS SLIDER */
        .mini-synopsis {
            padding: 20px 4%; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
            margin-top: -100px; position: relative; z-index: 5;
            min-height: 140px; display: flex; flex-direction: column; justify-content: flex-end;
        }
        #mini-title { font-size: 1.8rem; font-weight: bold; margin: 0; color: #fff; text-transform: uppercase; transition: opacity 0.3s; }
        #mini-info { font-size: 0.9rem; color: #46d369; margin: 5px 0; font-weight: bold; }
        #mini-desc { font-size: 1rem; color: #ccc; margin: 0; max-width: 800px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: opacity 0.3s; }

        /* SLIDERS */
        .row { padding: 15px 0 15px 4%; scroll-margin-top: 70px; }
        .row-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; color: #e5e5e5; display: flex; align-items: center; }
        .row-container {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        .row-container::-webkit-scrollbar { display: none; }

        .movie-card {
            flex: 0 0 135px; aspect-ratio: 2/3; background: #222;
            border-radius: 4px; overflow: hidden; cursor: pointer;
            transition: var(--transition); border: 2px solid transparent;
            position: relative;
        }

        .fallback-card {
            width: 100%; height: 100%; background: #333;
            display: flex; align-items: center; justify-content: center;
            color: var(--netflix-red); font-weight: 900; font-size: 18px;
            letter-spacing: -1px; text-align: center; padding: 10px;
        }

        .live-card {
            flex: 0 0 200px !important; 
            aspect-ratio: 16/9 !important;
        }

        @media (min-width: 900px) { 
            .movie-card { flex: 0 0 180px; } 
            .live-card { flex: 0 0 280px !important; }
        }

        .movie-card:focus { 
            transform: scale(1.08); 
            border: 2px solid var(--neon-red) !important; 
            box-shadow: var(--neon-glow); 
            z-index: 100; 
        }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        .card-title-container {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.7); padding: 5px;
            overflow: hidden; white-space: nowrap;
        }
        .card-title-text {
            display: inline-block; font-size: 11px;
            color: white; font-weight: bold; padding-left: 5px;
        }
        .movie-card:focus .card-title-text { animation: marquee 5s linear infinite; }

        /* CHECKPOINT VERDE */
        .watched-badge {
            position: absolute; top: 8px; left: 8px;
            color: var(--watched-green); font-size: 18px;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            z-index: 5; pointer-events: none;
        }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .delete-history {
            position: absolute; top: 5px; right: 5px;
            background: rgba(0,0,0,0.6); color: white;
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: 0.2s; z-index: 10;
            border: none; cursor: pointer;
        }
        .delete-history:focus { background: var(--netflix-red); transform: scale(1.1); box-shadow: var(--neon-glow); }

        /* MODAL DE DETALLES */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; z-index: 6000; justify-content: center;
        }
        .modal-content {
            background: #181818; width: 100%; max-width: 850px; height: 100vh;
            overflow-y: auto; position: relative;
        }
        .modal-video-box { height: 400px; background-size: cover; background-position: center; position: relative; }
        .modal-video-box::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, #181818, transparent); }
        .modal-details { padding: 20px 40px; }

        .meta-data { display: flex; align-items: center; gap: 15px; margin: 15px 0; font-weight: bold; }
        .match { color: #46d369; }
        .rating-box { border: 1px solid #808080; padding: 0 6px; border-radius: 3px; font-size: 12px; }

        #m-plot {
            color: #ddd; font-size: 18px; line-height: 1.6;
            max-height: 110px; overflow: hidden; background: rgba(255,255,255,0.03);
            padding: 15px; border-radius: 10px; border-left: 4px solid var(--neon-yellow);
            margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        }

        .btn-full-synopsis {
            background: none; border: none; color: var(--neon-yellow);
            cursor: pointer; font-weight: bold; margin-bottom: 20px;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-full-synopsis:focus { text-decoration: underline; transform: scale(1.05); }

        .btn-go {
            width: 100%; padding: 14px; background: #333;
            color: #fff; border: none; border-radius: 4px;
            font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        .btn-go:focus { box-shadow: var(--neon-glow); border: 1px solid var(--neon-red); }

        .load-more-card {
            flex: 0 0 135px; aspect-ratio: 2/3; background: #1a1a1a;
            border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; border: 2px dashed #444; color: #fff; transition: var(--transition);
        }
        .load-more-card:focus { border: 2px solid var(--neon-red); box-shadow: var(--neon-glow); transform: scale(1.05); }

        /* ESTILO EPISODIOS NETFLIX ANDROID */
        .episode-card {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 15px;
            padding: 15px;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .episode-card:focus {
            background: rgba(255,255,255,0.1);
            box-shadow: var(--neon-glow);
            border: 1px solid var(--netflix-red);
        }
        .ep-img-box {
            width: 140px;
            aspect-ratio: 16/9;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .ep-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .ep-info { display: flex; flex-direction: column; justify-content: center; }
        .ep-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; color: #fff; }
        .ep-meta { font-size: 12px; color: #aaa; }

        /* MODAL TEMPORADAS ESTILO ANDROID */
        .season-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; z-index: 8000; justify-content: center; align-items: center;
            animation: fadeIn 0.2s ease;
        }
        .season-list-container {
            width: 90%; max-width: 400px; text-align: center;
        }
        .season-item {
            padding: 20px; font-size: 18px; color: #aaa; cursor: pointer;
            transition: 0.2s;
        }
        .season-item.active { color: #fff; font-size: 24px; font-weight: bold; }
        .season-item:focus { color: var(--netflix-red); outline: none; transform: scale(1.1); }

        /* MODAL DE BÚSQUEDA */
        .search-modal { 
            position: fixed; inset: 0; 
            background: var(--netflix-black); 
            display: none; z-index: 5000; 
            flex-direction: column; 
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .search-header { 
            display: flex; align-items: center; 
            padding: 10px 20px; 
            background: rgba(34, 34, 34, 0.98); 
            height: 65px; gap: 15px;
            position: sticky; top: 0; z-index: 5001;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .search-input-wrapper {
            flex: 1; position: relative; display: flex; align-items: center;
        }
        .search-input { 
            width: 100%; background: #333; border: none; 
            padding: 12px 45px 12px 15px; color: white; 
            border-radius: 4px; outline: none; font-size: 16px;
        }

        .search-results-container {
            flex: 1; overflow-y: auto; padding: 20px 4%;
        }

        .search-results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
            gap: 15px;
        }

        @media (min-width: 900px) { 
            .search-results-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; align-items: center; justify-content: center; }
        .nf-loader { width: 50px; height: 50px; border: 4px solid #333; border-top-color: var(--netflix-red); border-radius: 50%; animation: spin 0.8s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #exit-dialog { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 30000; justify-content: center; align-items: center; }
        .cat-count { background: var(--netflix-red); font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 8px; font-weight: bold; }

        .smart-scroll-btn {
            position: fixed; bottom: 30px; right: 30px;
            width: 55px; height: 55px; background: var(--netflix-red);
            color: white; border: none; border-radius: 50%;
            cursor: pointer; z-index: 900; display: none;
            align-items: center; justify-content: center;
            font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: var(--transition);
        }

        .clear-search {
            position: absolute; right: 15px; color: #aaa; cursor: pointer; display: none;
        }

        /* --- NUEVO ESTILO MODAL CATEGORÍAS --- */
        #modal-categories {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; z-index: 9000; flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        .cat-modal-header {
            padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #333;
        }
        .cat-list-content {
            flex: 1; overflow-y: auto; padding: 10px 0;
        }
        .cat-item-row {
            padding: 15px 25px; display: flex; align-items: center; gap: 15px;
            font-size: 18px; color: #ccc; cursor: pointer; border-bottom: 1px solid #222;
        }
        .cat-item-row i { color: var(--netflix-red); font-size: 20px; }
        .cat-item-row:focus { background: rgba(255,255,255,0.1); color: #fff; outline: none; }
        .cat-item-row:focus i { transform: scale(1.2); }
        
        /* --- ESTILOS PANEL ADMIN DNS OCULTO --- */
        #admin-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; z-index: 150000; flex-direction: column; align-items: center; justify-content: center;
        }
        .admin-box {
            background: #181818; padding: 30px; border-radius: 8px; width: 90%; max-width: 600px; border: 1px solid var(--netflix-red); box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }
        .admin-header { font-size: 22px; font-weight: bold; color: var(--netflix-red); margin-bottom: 20px; text-align: center; }
        .dns-item { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .dns-item input { background: transparent; border: none; color: white; width: 85%; font-size: 14px; outline: none;}
        .dns-actions button { background: none; border: none; color: white; cursor: pointer; margin-left: 10px; font-size: 16px; }
        .dns-actions .btn-del { color: var(--netflix-red); }
    </style>
</head>
<body class="">

    <audio id="intro-audio" loop src="https://cdn.pixabay.com/download/audio/2022/05/16/audio_b28e67f70d.mp3?filename=cinematic-intro-6098.mp3"></audio>

    <div id="intro-screen" style="position: fixed; inset: 0; background: #000; z-index: 199999; display: none; align-items: center; justify-content: center; flex-direction: column; transition: opacity 1s ease;">
        <h1 class="intro-logo" data-text="TRISTÁN TV">TRISTÁN TV</h1>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>

    <div id="admin-panel">
        <div class="admin-box">
            <div class="admin-header"><i class="fas fa-server"></i> Panel Maestro de DNS</div>
            <div id="dns-list-container" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;"></div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="new-dns-input" placeholder="http://nueva-dns.com:8080" style="flex: 1; padding: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; outline: none;">
                <button class="btn-red nav-item" style="width: auto; margin: 0; padding: 10px 20px;" onclick="addDns()">Agregar</button>
            </div>

                <button class="nav-item" style="background: #333; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;" onclick="closeAdminPanel()">Cancelar</button>
                <button class="btn-red nav-item" style="width: auto; margin: 0; padding: 10px 20px;" onclick="saveDns()">Publicar y Guardar</button>
            </div>

    <script>
        // VARIABLE DINÁMICA QUE CARGA DNS GUARDADAS O USA LAS POR DEFECTO
        let dnsList = JSON.parse(localStorage.getItem('tvt_master_dns')) || [
            "http://alfastr3am.lat:2082", 
            "http://allinonestream.fans:8080", 
            "http://dns.digitaltvmx.site:8080", 
            "http://zeustv.vip:8080",
            "https://dns.rockytvplus.com.mx",
            "https://rockytvplus.com"
        ];
        
        let host = "", u = "", p = "", currentMode = '', lastFocus = null, currentSeriesData = null;
        let globalDatabase = { live: [], movie: [], series: [] };
        let categoryCounts = { live: {}, movie: {}, series: {} };
        const paginationTracker = new Map();
        const cacheData = new Map();
        let sliderMovies = [], sliderIndex = 0, sliderInterval = null, inactivityTimeout = null, isClosingModal = false;
        let isAtBottom = false;

        const memoryViews = { home: document.createElement('div'), live: document.createElement('div'), movie: document.createElement('div'), series: document.createElement('div') };

        // --- NUEVA LÓGICA DE SECUENCIA INTRO ---
        function startAppSequence() {
            const introScreen = document.getElementById('intro-screen');
            introScreen.style.display = 'flex';
            
            const bgAudio = document.getElementById('intro-audio');
            bgAudio.volume = 0.5;
            // Play audio as soon as animation starts
            bgAudio.play().catch(e => console.log("Audio play blocked", e));

            // Esperar el tiempo de la animación de carga (3.5s + margen = 4.5s)
            setTimeout(() => {
                introScreen.style.opacity = '0'; // Fade out
                setTimeout(() => {
                    introScreen.style.display = 'none';
                    
                    // Después de la intro, verificamos si ya había sesión iniciada
                    const savedU = localStorage.getItem('fire_u'), savedP = localStorage.getItem('fire_p');
                    if(savedU && savedP) {
                        document.getElementById('user').value = savedU;
                        document.getElementById('pass').value = savedP;
                        updatePreview(); 
                        auth(); // Auto-login silencioso
                    } else {
                        document.getElementById('login').style.display = 'flex'; // Mostrar cuadro de login
                    }
                }, 1000); // 1s para que termine de desvanecer
            }, 4500); 
        }

        // Se ejecuta la animación inicial automáticamente en lugar de esperar al botón
        window.onload = () => {
            startAppSequence();
        };

        // --- FUNCIONES NUEVAS LOGIN ---
        function updatePreview() {
            const userVal = document.getElementById('user').value;
            const passVal = document.getElementById('pass').value;
            const preview = document.getElementById('live-preview');
            
            if(!userVal && !passVal) {
                preview.innerHTML = '<span style="color: #888;">Escribe tus credenciales...</span>';
                return;
            }
            preview.innerHTML = `<strong>U:</strong> ${userVal} | <strong>P:</strong> ${passVal}`;
        }

        function togglePassVisibility() {
            const passInput = document.getElementById('pass');
            const eyeIcon = document.getElementById('eye-icon');
            if(passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.className = 'fas fa-eye-slash';
            } else {
                passInput.type = 'password';
                eyeIcon.className = 'fas fa-eye';
            }
        }

        // --- LÓGICA DEL PANEL OCULTO ADMINISTRADOR ---
        let logoClicks = 0;
        let logoClickTimer = null;

        function handleLogoClick() {
            logoClicks++;
            if(logoClickTimer) clearTimeout(logoClickTimer);
            
            logoClickTimer = setTimeout(() => { 
                logoClicks = 0; 
            }, 1500); // Tienes 1.5 segundos para hacer los 3 clics

            if(logoClicks >= 3) {
                logoClicks = 0;
                const pass = prompt("Acceso Restringido - Ingrese código maestro:");
                if(pass === "2425" || pass === "firenetx2026") {
                    openAdminPanel();
                } else if(pass) {
                    alert("Código incorrecto o no autorizado.");
                }
            }
        }

        function openAdminPanel() {
            document.getElementById('admin-panel').style.display = 'flex';
            renderDnsList();
        }

        function closeAdminPanel() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        function renderDnsList() {
            const container = document.getElementById('dns-list-container');
            container.innerHTML = '';
            dnsList.forEach((dns, index) => {
                const div = document.createElement('div');
                div.className = 'dns-item';
                div.innerHTML = `
                    <input type="text" value="${dns}" onchange="updateDnsTemp(${index}, this.value)">
                    <div class="dns-actions">
                        <button class="btn-del" onclick="removeDns(${index})" title="Eliminar DNS"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateDnsTemp(index, val) {
            dnsList[index] = val;
        }

        function removeDns(index) {
            dnsList.splice(index, 1);
            renderDnsList();
        }

        function addDns() {
            const input = document.getElementById('new-dns-input');
            const val = input.value.trim();
            if(val) {
                dnsList.push(val);
                input.value = '';
                renderDnsList();
            }
        }

        function saveDns() {
            localStorage.setItem('tvt_master_dns', JSON.stringify(dnsList));
            alert("✅ Cambios en DNS guardados y publicados correctamente.\nSe recargará la aplicación para aplicar los ajustes.");
            location.reload();
        }
        // --- FIN LÓGICA PANEL OCULTO ---

        function handleImgError(img) {
            const container = img.parentElement;
            img.style.display = 'none';
            const fallback = document.createElement('div');
            fallback.className = 'fallback-card';
            fallback.innerText = 'TVTRISTAN';
            container.prepend(fallback);
        }

        /* --- AQUI ESTA EL ANTIBLOQUEO IMPLEMENTADO Y CORREGIDO --- */
        async function fetchRetry(url) {
            if(cacheData.has(url)) return cacheData.get(url);
            
            // Tiempo límite extendido a 15 segundos para listas IPTV gigantes
            const timeout = 15000; 
            
            const fetchWithTimeout = async (fetchUrl) => {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                try {
                    const response = await fetch(fetchUrl, { signal: controller.signal });
                    clearTimeout(id);
                    if (!response.ok) throw new Error("Error HTTP: " + response.status);
                    return await response.json();
                } catch (error) {
                    clearTimeout(id);
                    throw error;
                }
            };

            // Sistema de cascada con 4 puentes proxies super potentes para saltar CORS y Mixed Content
            const proxies = [
                'https://api.codetabs.com/v1/proxy?quest=' + url,
                'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
                'https://corsproxy.io/?' + encodeURIComponent(url),
                'https://thingproxy.freeboard.io/fetch/' + url
            ];

            for (let proxy of proxies) {
                try {
                    const data = await fetchWithTimeout(proxy);
                    if (data) {
                        cacheData.set(url, data);
                        return data;
                    }
                } catch (e) {
                    console.warn(`Fallo en el puente proxy (${proxy.split('/')[2]}):`, e.message);
                    // Si falla, el loop continúa intentando con el siguiente puente automáticamente
                }
            }
            
            // Si todos los puentes fallan, devuelve null para no colgar la interfaz
            console.error("Bloqueo detectado: Todos los puentes CORS fallaron para:", url);
            return null;
        }

        function logout() { localStorage.clear(); location.reload(); }

        /* --- LOGICA DE LOGIN ACTUALIZADA PARA ALERTAR ERRORES --- */
        async function auth() {
            u = document.getElementById('user').value.trim();
            p = document.getElementById('pass').value.trim();
            if(!u || !p) return;
            toggleLoader(true);
            
            let success = false;
            
            for(let base of dnsList) {
                const data = await fetchRetry(`${base}/player_api.php?username=${u}&password=${p}`);
                if(data?.user_info?.auth === 1) {
                    success = true;
                    host = base;
                    localStorage.setItem('fire_u', u); localStorage.setItem('fire_p', p);
                    
                    document.getElementById('login').style.display = 'none';
                    const splash = document.getElementById('splash-screen');
                    const img1 = document.getElementById('splash-img-1');
                    const img2 = document.getElementById('splash-img-2');
                    
                    splash.style.display = 'flex';
                    
                    // Mostrar Imagen 1 (3 segundos)
                    img1.style.display = 'block';
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    img1.style.display = 'none';
                    
                    // Mostrar Imagen 2 (3 segundos)
                    img2.style.display = 'block';
                    await new Promise(resolve => setTimeout(resolve, 3000));

                    // Desvanecer splash completo
                    splash.style.opacity = '0';
                    await new Promise(resolve => setTimeout(resolve, 800)); 
                    splash.style.display = 'none';

                    document.getElementById('main-content').style.display = 'block';
                    document.getElementById('btn-smart-scroll').style.display = 'flex';
                    
                    document.getElementById('main-sidebar').style.display = 'flex';
                    document.body.classList.add('with-sidebar');

                    await preloadGlobalData();
                    showHome();
                    initAutoSlider(); 
                    break; 
                }
            }
            
            toggleLoader(false);
            
            if (!success) {
                alert("Error de conexión: Por favor, verifica tu usuario/contraseña o intenta más tarde. (Posible bloqueo de red o proxies saturados)");
            }
        }

        function toggleSmartScroll() {
            const btn = document.getElementById('btn-smart-scroll');
            const icon = btn.querySelector('i');
            if (!isAtBottom) {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                icon.className = 'fas fa-chevron-up';
                isAtBottom = true;
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                icon.className = 'fas fa-chevron-down';
                isAtBottom = false;
            }
        }

        async function preloadGlobalData() {
            const types = [ { key: 'live', action: 'get_live_streams' }, { key: 'movie', action: 'get_vod_streams' }, { key: 'series', action: 'get_series' } ];
            for(let t of types) {
                const data = await fetchRetry(`${host}/player_api.php?username=${u}&password=${p}&action=${t.action}`);
                if(data && Array.isArray(data)) {
                    globalDatabase[t.key] = data;
                    data.forEach(item => { const catId = item.category_id || "0"; categoryCounts[t.key][catId] = (categoryCounts[t.key][catId] || 0) + 1; });
                    document.getElementById(`count-${t.key}`).innerHTML = `<span class="cat-count">${data.length}</span>`;
                }
            }
            sliderMovies = globalDatabase.movie.slice(0, 15);
        }

        function initAutoSlider() {
            if (sliderMovies.length === 0) return;
            if(sliderInterval) clearInterval(sliderInterval);
            sliderInterval = setInterval(() => {
                sliderIndex = (sliderIndex + 1) % sliderMovies.length;
                updateMiniSynopsis(sliderMovies[sliderIndex], 'movie');
            }, 6000);
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(() => {
                if (document.getElementById('modal-info').style.display !== 'flex' && 
                    document.getElementById('modal-search').style.display !== 'flex') initAutoSlider();
            }, 6000); 
        }

        function switchView(mode) {
            isAtBottom = false;
            document.getElementById('btn-smart-scroll').querySelector('i').className = 'fas fa-chevron-down';
            window.scrollTo(0,0);
            const wrapper = document.getElementById('rows-wrapper');
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
            if(document.getElementById(`btn-${mode}`)) document.getElementById(`btn-${mode}`).classList.add('active');
            wrapper.innerHTML = "";
            renderContinueWatching(mode);
            wrapper.appendChild(memoryViews[mode]);
            currentMode = mode;
        }

        function removeFromHistory(sid, mode) {
            let list = JSON.parse(localStorage.getItem('fire_continue') || '[]');
            list = list.filter(i => {
                const id = i.stream_id || i.series_id || i.id;
                return String(id) !== String(sid);
            });
            localStorage.setItem('fire_continue', JSON.stringify(list));
            renderContinueWatching(mode);
        }

        function saveToHistory(item, type) {
            let list = JSON.parse(localStorage.getItem('fire_continue') || '[]');
            const sid = item.stream_id || item.series_id || item.id;
            list = list.filter(i => String(i.stream_id || i.series_id || i.id) !== String(sid));
            item._contentType = type;
            list.unshift(item);
            if(list.length > 20) list.pop();
            localStorage.setItem('fire_continue', JSON.stringify(list));
        }

        function renderContinueWatching(mode) {
            const container = document.getElementById('continue-watching-row');
            if(mode === 'home') { container.style.display = 'none'; return; }
            let list = JSON.parse(localStorage.getItem('fire_continue') || '[]').filter(i => i._contentType === mode);
            if(list.length === 0) { container.style.display = 'none'; return; }
            container.innerHTML = "";
            container.style.display = 'block';
            const row = document.createElement('div');
            row.className = "row";
            row.innerHTML = `<div class="row-title">Seguir viendo</div><div class="row-container"></div>`;
            container.appendChild(row);
            const scrollBox = row.querySelector('.row-container');
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = (item._contentType === 'live') ? "movie-card live-card nav-item" : "movie-card nav-item";
                card.tabIndex = 0;
                const sid = item.stream_id || item.series_id || item.id;
                const displayImage = (item._contentType === 'series') ? (item.cover || item.stream_icon) : (item.stream_icon || item.cover);
                card.innerHTML = `
                    <img src="${displayImage || ''}" onerror="handleImgError(this)" loading="lazy">
                    <button class="delete-history nav-item" onclick="event.stopPropagation(); removeFromHistory('${sid}', '${mode}')">
                        <i class="fas fa-trash"></i>
                    </button>
                    <div class="card-title-container"><span class="card-title-text">${item.name || item.title}</span></div>
                `;
                card.onclick = () => { lastFocus = card; openDetails(item, item._contentType); };
                card.onfocus = () => updateMiniSynopsis(item, item._contentType);
                scrollBox.appendChild(card);
            });
        }

        async function showHome() { 
            if (memoryViews.home.hasChildNodes()) { switchView('home'); return; }
            toggleLoader(true);
            createRow("Películas Recientes", globalDatabase.movie.slice(0, 40), "movie", "home_movies", memoryViews.home);
            createRow("Series Recientes", globalDatabase.series.slice(0, 40), "series", "home_series", memoryViews.home);
            switchView('home');
            toggleLoader(false);
        }

        async function changeMode(mode) {
            if (memoryViews[mode].hasChildNodes()) { switchView(mode); return; }
            toggleLoader(true);
            if(globalDatabase[mode]?.length > 0) createRow(`TODO EL CONTENIDO <span class="cat-count">${globalDatabase[mode].length}</span>`, globalDatabase[mode], mode, `all_${mode}`, memoryViews[mode]);
            const actions = { live: 'get_live_categories', movie: 'get_vod_categories', series: 'get_series_categories' };
            const categories = await fetchRetry(`${host}/player_api.php?username=${u}&password=${p}&action=${actions[mode]}`);
            if(categories) {
                categories.forEach(cat => {
                    const filtered = globalDatabase[mode].filter(item => item.category_id === cat.category_id);
                    if(filtered.length > 0) createRow(`${cat.category_name} <span class="cat-count">${filtered.length}</span>`, filtered, mode, `cat_${cat.category_id}`, memoryViews[mode]);
                });
            }
            switchView(mode);
            toggleLoader(false);
        }

        function createRow(title, data, type, rowId, parentNode) {
            const row = document.createElement('div');
            row.className = "row";
            row.innerHTML = `<div class="row-title">${title}</div><div class="row-container" id="${rowId}"></div>`;
            row.id = `row_parent_${rowId}`; 
            parentNode.appendChild(row);
            paginationTracker.set(rowId, 0);
            renderItemsBatch(row.querySelector('.row-container'), data, type, rowId);
        }

        function isWatched(id) {
            const watchedList = JSON.parse(localStorage.getItem('fire_watched') || '[]');
            return watchedList.includes(String(id));
        }

        function addToWatched(id) {
            let watchedList = JSON.parse(localStorage.getItem('fire_watched') || '[]');
            if(!watchedList.includes(String(id))) {
                watchedList.push(String(id));
                localStorage.setItem('fire_watched', JSON.stringify(watchedList));
            }
        }

        function renderItemsBatch(container, data, type, rowId) {
            const currentCount = paginationTracker.get(rowId);
            const batchSize = 60;
            const nextBatch = data.slice(currentCount, currentCount + batchSize);
            let firstNewElement = null;
            nextBatch.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = (type === 'live') ? "movie-card live-card nav-item" : "movie-card nav-item"; 
                card.tabIndex = 0;
                card.innerHTML = `
                    <img src="${item.stream_icon || item.cover || ''}" onerror="handleImgError(this)" loading="lazy">
                    <div class="card-title-container"><span class="card-title-text">${item.name}</span></div>
                `;
                card.onfocus = () => { if(!isClosingModal) { if(sliderInterval) { clearInterval(sliderInterval); sliderInterval = null; } updateMiniSynopsis(item, type); resetInactivityTimer(); } };
                card.onclick = () => { lastFocus = card; openDetails(item, type); };
                container.appendChild(card);
                if(index === 0) firstNewElement = card;
            });
            const oldBtn = container.querySelector('.load-more-card'); 
            if(oldBtn) oldBtn.remove();
            const newTotal = currentCount + nextBatch.length;
            paginationTracker.set(rowId, newTotal);
            if (newTotal < data.length) {
                const loadBtn = document.createElement('div');
                loadBtn.className = (type === 'live') ? "load-more-card live-card nav-item" : "load-more-card nav-item"; 
                loadBtn.tabIndex = 0; 
                loadBtn.innerHTML = `<span>+${data.length - newTotal}</span>`;
                loadBtn.onclick = (e) => { e.stopPropagation(); renderItemsBatch(container, data, type, rowId); };
                container.appendChild(loadBtn);
            }
            if(currentCount > 0 && firstNewElement) {
                setTimeout(() => {
                    firstNewElement.focus();
                    firstNewElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
                }, 50);
            }
        }

        function updateMiniSynopsis(item, type) {
            const t = document.getElementById('mini-title'), d = document.getElementById('mini-desc');
            if(!t) return;
            t.style.opacity = 0; d.style.opacity = 0;
            setTimeout(() => {
                t.innerText = item.name || "...";
                d.innerText = item.plot || "TVTRISTAN: Entretenimiento sin límites.";
                document.getElementById('hero-feature').style.backgroundImage = `url(${item.cover || item.stream_icon})`;
                document.getElementById('hero-play-btn').onclick = () => playContent(item, type);
                t.style.opacity = 1; d.style.opacity = 1;
            }, 200);
        }

        async function openDetails(item, type) {
            toggleLoader(true);
            const id = item.stream_id || item.series_id || item.id;
            const action = type === 'series' ? 'get_series_info' : 'get_vod_info';
            const details = await fetchRetry(`${host}/player_api.php?username=${u}&password=${p}&action=${action}&${type === 'series' ? 'series_id' : 'vod_id'}=${id}`);
            document.getElementById('m-title').innerText = item.name;
            document.getElementById('m-banner').style.backgroundImage = `url(${item.cover || item.stream_icon})`;
            document.getElementById('m-plot').innerText = details?.info?.plot || "Sin descripción disponible.";
            if(type === 'series') {
                document.getElementById('series-section').style.display = 'block';
                document.getElementById('m-play-btn').style.display = 'none';
                currentSeriesData = details;
                currentSeriesData._parentItem = item; 
                const seasons = Object.keys(details.episodes || {}).sort((a,b)=>a-b);
                if(seasons.length > 0) { renderSeasonsModal(seasons); loadSeason(seasons[0]); }
            } else {
                document.getElementById('series-section').style.display = 'none';
                document.getElementById('m-play-btn').style.display = 'flex';
                document.getElementById('m-play-btn').onclick = () => playContent(item, type);
            }
            document.getElementById('modal-info').style.display = 'flex';
            setTimeout(() => { (type === 'series' ? document.getElementById('season-selector-btn') : document.getElementById('m-play-btn')).focus(); }, 150);
            toggleLoader(false);
        }

        function loadSeason(num) {
            const list = document.getElementById('episodes-list'); list.innerHTML = "";
            document.getElementById('current-season-label').innerText = `Temporada ${num}`;
            (currentSeriesData.episodes[num] || []).forEach((ep, i) => {
                const card = document.createElement('div');
                card.className = "episode-card nav-item"; card.tabIndex = 0;
                const epId = ep.id || ep.stream_id;
                const watched = isWatched(epId) ? `<i class="fas fa-check-circle" style="color:var(--watched-green); margin-right:5px;"></i>` : '';
                card.innerHTML = `
                    <div class="ep-img-box">
                        <img src="${ep.info?.movie_image || currentSeriesData.info.cover}" onerror="handleImgError(this)">
                        <div style="position:absolute; inset:0; background:rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center;">
                            <i class="fas fa-play" style="font-size:20px; color:#fff;"></i>
                        </div>
                    </div>
                    <div class="ep-info">
                        <div class="ep-title">${watched} ${i+1}. ${ep.title || 'Episodio ' + (i+1)}</div>
                        <div class="ep-meta">${ep.info?.duration || '45m'}</div>
                    </div>
                `;
                card.onclick = () => playContent(ep, 'series', currentSeriesData._parentItem);
                list.appendChild(card);
            });
            closeSeasonsModal();
        }

        function renderSeasonsModal(seasons) {
            const list = document.getElementById('season-selector-list');
            list.innerHTML = "";
            seasons.forEach(s => {
                const item = document.createElement('div');
                item.className = "season-item nav-item";
                item.tabIndex = 0;
                item.innerText = `Temporada ${s}`;
                item.onclick = () => loadSeason(s);
                list.appendChild(item);
            });
        }

        function openSeasonsModal() {
            document.getElementById('modal-seasons').style.display = 'flex';
            setTimeout(() => { document.querySelector('.season-item')?.focus(); }, 100);
        }

        function closeSeasonsModal() { document.getElementById('modal-seasons').style.display = 'none'; }

        async function openCategories() {
            if(currentMode === 'home') { alert("Selecciona TV, Películas o Series primero."); return; }
            toggleLoader(true);
            const actions = { live: 'get_live_categories', movie: 'get_vod_categories', series: 'get_series_categories' };
            const categories = await fetchRetry(`${host}/player_api.php?username=${u}&password=${p}&action=${actions[currentMode]}`);
            const list = document.getElementById('categories-list');
            list.innerHTML = "";
            if(categories) {
                categories.forEach(cat => {
                    const count = globalDatabase[currentMode].filter(i => i.category_id === cat.category_id).length;
                    if(count > 0) {
                        const item = document.createElement('div');
                        item.className = "cat-item-row nav-item";
                        item.tabIndex = 0;
                        item.innerHTML = `<i class="fas fa-folder"></i> <span>${cat.category_name}</span> <span class="cat-count">${count}</span>`;
                        item.onclick = () => {
                            const target = document.getElementById(`row_parent_cat_${cat.category_id}`);
                            if(target) { target.scrollIntoView({ behavior: 'smooth', block: 'start' }); closeCategories(); setTimeout(() => target.querySelector('.movie-card')?.focus(), 500); }
                        };
                        list.appendChild(item);
                    }
                });
            }
            document.getElementById('modal-categories').style.display = 'flex';
            toggleLoader(false);
            setTimeout(() => document.querySelector('.cat-item-row')?.focus(), 150);
        }

        function closeCategories() { document.getElementById('modal-categories').style.display = 'none'; }

        function playContent(item, type, parent = null) {
            const sid = item.stream_id || item.series_id || item.id;
            addToWatched(sid);
            if (type === 'series' && parent) { saveToHistory(parent, 'series'); } else { saveToHistory(item, type); }
            const fullTitle = item.title || item.name || "TVTRISTAN Content";
            const streamId = item.stream_id || item.id;
            let url = `${host}/${type === 'live' ? 'live' : type === 'series' ? 'series' : 'movie'}/${u}/${p}/${streamId}.${item.container_extension || 'mp4'}`;
            if(type === 'live') url = `${host}/live/${u}/${p}/${streamId}.ts`;
            
            const detectedScheme = host.startsWith('https') ? 'https' : 'http';

            window.location.href = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=${detectedScheme};type=video/*;S.title=${encodeURIComponent(fullTitle)};end`;
        }

        function openSearch() { 
            document.getElementById('modal-search').style.display = 'flex'; 
            document.getElementById('global-search-input').focus(); 
        }

        function closeSearch() { 
            document.getElementById('modal-search').style.display = 'none'; 
            resetInactivityTimer(); 
        }

        function clearSearchInput() {
            const input = document.getElementById('global-search-input');
            input.value = "";
            performGlobalSearch("");
            input.focus();
        }

        function performGlobalSearch(q) {
            const query = q.toLowerCase().trim();
            const grid = document.getElementById('search-results-grid');
            const clearBtn = document.getElementById('clear-search-btn');
            clearBtn.style.display = query.length > 0 ? 'block' : 'none';
            grid.innerHTML = "";
            if (query.length < 2) return;
            const allResults = [ ...globalDatabase.live.map(i => ({...i, _type: 'live'})), ...globalDatabase.movie.map(i => ({...i, _type: 'movie'})), ...globalDatabase.series.map(i => ({...i, _type: 'series'})) ];
            const filtered = allResults.filter(item => (item.name || "").toLowerCase().includes(query)).slice(0, 100);
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = (item._type === 'live') ? "movie-card live-card nav-item" : "movie-card nav-item"; 
                card.tabIndex = 0;
                card.innerHTML = `
                    <img src="${item.stream_icon || item.cover || ''}" onerror="handleImgError(this)" loading="lazy">
                    <div class="card-title-container"><span class="card-title-text">${item.name}</span></div>
                `;
                card.onclick = () => { lastFocus = card; openDetails(item, item._type); };
                grid.appendChild(card);
            });
        }

        function closeModal() { 
            isClosingModal = true; 
            document.getElementById('modal-info').style.display = 'none'; 
            resetInactivityTimer(); 
            if(lastFocus) { setTimeout(() => { lastFocus.focus(); isClosingModal = false; }, 100); }
        }

        function openSynopsisModal() {
            const fullPlot = document.getElementById('m-plot').innerText;
            document.getElementById('full-plot-text').innerText = fullPlot;
            document.getElementById('modal-synopsis').style.display = 'flex';
            setTimeout(() => { document.getElementById('btn-close-synopsis').focus(); }, 100);
        }

        function closeSynopsisModal() {
            document.getElementById('modal-synopsis').style.display = 'none';
            setTimeout(() => { document.getElementById('btn-show-synopsis').focus(); }, 100);
        }

        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            const isCatModal = document.getElementById('modal-categories').style.display === 'flex';
            const isSeasonModal = document.getElementById('modal-seasons').style.display === 'flex';
            const isSearchModal = document.getElementById('modal-search').style.display === 'flex';
            const isSynopsisModal = document.getElementById('modal-synopsis').style.display === 'flex';
            const isInfoModal = document.getElementById('modal-info').style.display === 'flex';
            const isAdminModal = document.getElementById('admin-panel').style.display === 'flex';
            
            if(e.key === "Backspace") {
                if(isAdminModal) { e.preventDefault(); closeAdminPanel(); return; }
                if(isCatModal) { e.preventDefault(); closeCategories(); return; }
                if(isSynopsisModal) { e.preventDefault(); closeSynopsisModal(); return; }
                if(isSeasonModal) { e.preventDefault(); closeSeasonsModal(); return; }
                if(isInfoModal) { e.preventDefault(); closeModal(); return; }
                if(isSearchModal && active.id !== 'global-search-input') { e.preventDefault(); closeSearch(); return; }
            }

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                if (isSearchModal && active.id === 'global-search-input' && e.key === 'ArrowDown') {
                    const firstResult = document.querySelector('#search-results-grid .nav-item');
                    if(firstResult) { firstResult.focus(); return; }
                }
                e.preventDefault();
                let scope = isCatModal ? document.getElementById('modal-categories') : (isSynopsisModal ? document.getElementById('modal-synopsis') : (isSeasonModal ? document.getElementById('modal-seasons') : (isInfoModal ? document.getElementById('modal-info') : (isSearchModal ? document.getElementById('modal-search') : document.body))));
                const items = Array.from(scope.querySelectorAll('.nav-item')).filter(i => i.getBoundingClientRect().height > 0);
                const aRect = active.getBoundingClientRect();
                const aC = { x: aRect.left + aRect.width/2, y: aRect.top + aRect.height/2 };
                let best = null, minDist = Infinity;
                items.forEach(item => {
                    if(item === active) return;
                    const r = item.getBoundingClientRect();
                    const iC = { x: r.left + r.width/2, y: r.top + r.height/2 };
                    const dx = iC.x - aC.x, dy = iC.y - aC.y;
                    let v = false;
                    if(e.key === 'ArrowRight' && dx > 10 && Math.abs(dy) < 150) v = true;
                    if(e.key === 'ArrowLeft' && dx < -10 && Math.abs(dy) < 150) v = true;
                    if(e.key === 'ArrowDown' && dy > 10) v = true;
                    if(e.key === 'ArrowUp' && dy < -10) v = true;
                    if(v) { const d = Math.sqrt(dx*dx + dy*dy); if(d < minDist) { minDist = d; best = item; } }
                });
                if(best) { best.focus(); best.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            }
            if(e.key === "Enter" && active) active.click();
        });

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    </script>
</body>
</html>
